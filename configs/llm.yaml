# LLM 模型配置
# API 密钥和 Base URL 从 .env 文件中读取（环境变量优先级高于此文件）

llm:
  # 默认模型提供商: openai / anthropic / custom
  provider: openai

  # 默认模型
  model: sensenova-6.7-flash-lite

  # API 密钥 — 从环境变量 LLM_API_KEY 读取（在 .env 中配置）
  api_key: ${LLM_API_KEY}

  # API 基础 URL — 从环境变量 LLM_BASE_URL 读取（在 .env 中配置，留空使用官方端点）
  base_url: ${LLM_BASE_URL:}

  # 默认生成参数
  default_params:
    temperature: 0.7
    max_tokens: 4096
    top_p: 1.0

  # 重试配置
  retry:
    max_retries: 1
    base_delay: 2.0
    max_delay: 30.0
    backoff_factor: 2.0

  # 模型降级配置 — 主模型失败时兜底
  fallback:
    enabled: true
    chain:
      - deepseek-v4-flash

  # 超时配置（秒）
  timeout:
    connect: 15
    read: 180
    write: 30

  # 代理配置（默认不使用代理，如需请在 .env 中配置 LLM_HTTPS_PROXY）
  proxy:
    http_proxy: ${LLM_HTTP_PROXY:}
    https_proxy: ${LLM_HTTPS_PROXY:}

  # 多模型配置（按用途指定不同模型）
  models:
    # 规划模型 — 生成 PlanIR（需要强推理能力）
    planning:
      model: sensenova-6.7-flash-lite
      temperature: 0.3
      max_tokens: 8192

    # 修复模型 — IR 解析失败时重试（需要快速响应）
    repair:
      model: deepseek-v4-flash
      temperature: 0.2
      max_tokens: 4096

    # 评估裁判模型 — 过程评估（轻量即可）
    judge:
      model: deepseek-v4-flash
      temperature: 0.1
      max_tokens: 2048

    # 对话模型 — 日常交互（需要平衡质量和速度）
    chat:
      model: sensenova-6.7-flash-lite
      temperature: 0.7
      max_tokens: 4096

  # 预算控制
  budget:
    # 单次任务最大 token 数
    max_tokens_per_task: 200000
    # 每日最大 token 数
    daily_token_limit: 1000000
    # 单次请求最大 token 数
    max_tokens_per_request: 16384

  # 缓存配置
  cache:
    enabled: true
    ttl: 120          # 响应缓存 TTL（秒）
    max_size: 200     # 最大缓存条目数
    tool_ttl: 300     # 工具结果缓存 TTL（秒）
